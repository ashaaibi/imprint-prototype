<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — IMPRINT®</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css"><link rel="stylesheet" href="catalog.css">
  <style>
    .order{border:1px solid var(--imp-border);border-radius:var(--imp-r-lg);overflow:hidden;background:var(--imp-surface);margin-bottom:16px;}
    .order-top{display:flex;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid var(--imp-border);flex-wrap:wrap;}
    .order-thumb{width:54px;height:54px;border-radius:var(--imp-r-md);object-fit:cover;background:var(--imp-surface-2);}
    .order-id{font-size:12px;color:var(--imp-fg-3);}
    .order-name{font-size:15px;font-weight:700;color:var(--imp-fg);}
    .order-status{margin-left:auto;font-size:12px;font-weight:700;padding:5px 11px;border-radius:var(--imp-r-pill);}
    .st-delivered{background:var(--imp-success-bg);color:var(--imp-success);}
    .st-production{background:var(--imp-warning-bg);color:var(--imp-warning);}
    .st-shipped{background:var(--imp-info-bg);color:var(--imp-info);}
    .order-body{display:flex;gap:28px;padding:16px 18px;flex-wrap:wrap;font-size:13px;}
    .order-body .k{color:var(--imp-fg-3);font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
    .order-body .v{color:var(--imp-fg);font-weight:600;margin-top:2px;}
    .track{display:flex;gap:0;padding:8px 18px 18px;}
    .track .step{flex:1;text-align:center;position:relative;font-size:10.5px;color:var(--imp-fg-3);}
    .track .step::before{content:"";display:block;width:12px;height:12px;border-radius:50%;background:var(--imp-surface-3);margin:0 auto 6px;}
    .track .step.done::before{background:var(--imp-success);}
    .track .step.done{color:var(--imp-fg-2);}
    .track .step::after{content:"";position:absolute;top:5px;left:-50%;width:100%;height:2px;background:var(--imp-surface-3);z-index:-1;}
    .track .step:first-child::after{display:none;}
    .track .step.done::after{background:var(--imp-success);}
  </style>
</head>
<body>
<div id="site-header"></div>
<div id="site-nav"></div>
<main class="imp-wrap">
  <div class="pagehead"><h1>Your orders</h1><p>Track production and delivery. Every order is routed to the manufacturer you chose at checkout.</p></div>
  <div class="sec" id="orders"></div>
</main>
<div id="site-footer"></div>
<script src="shared.js"></script><script src="catalog.js"></script><script src="app.js"></script>
<script>
(function(){
  IMP.initAppHeader({ activePage:'' });
  var C=IMP.cat();
  var STAGES=['Confirmed','Production file','In production','Quality check','Shipped','Delivered'];
  function pickP(id){ return IMP.product(id)||C.products[0]; }
  function money(a){ return IMP.price(a); }

  var orders=[];
  // live cart order if present
  var live = (typeof getOrder==='function') ? getOrder() : null;
  if(live){ orders.push({ id:live.orderId||'IMP-LIVE', name:live.product||'Custom order', img:'templates/renders/honey-gift-bag-1.jpg', qty:live.qty||500, total:live.total||0, maker:live.manufacturer||'Imprint Atelier', stage:1, status:'production', date:'Today' }); }

  // demo history (investor view)
  var honey=IMP.product('honeyloom-gift-bag');
  var p2=C.products[3], p3=C.products[8];
  orders.push({ id:'IMP-8842', name:honey.name, img:honey.image, qty:500, total:honey.price*500*1.05, maker:'Imprint Atelier', stage:5, status:'delivered', date:'2 Jun 2026' });
  orders.push({ id:'IMP-8713', name:p2.name, img:p2.image, qty:1000, total:p2.price*1000*1.05, maker:'Gulf Print Works', stage:4, status:'shipped', date:'9 Jun 2026' });
  orders.push({ id:'IMP-8690', name:p3.name, img:p3.image, qty:250, total:p3.price*250*1.05, maker:'Najm Packaging', stage:2, status:'production', date:'11 Jun 2026' });

  document.getElementById('orders').innerHTML = orders.map(function(o){
    var stCls={delivered:'st-delivered',production:'st-production',shipped:'st-shipped'}[o.status]||'st-production';
    var stTxt={delivered:'Delivered',production:'In production',shipped:'Shipped'}[o.status]||'In production';
    var steps=STAGES.map(function(s,i){ return '<div class="step'+(i<=o.stage?' done':'')+'">'+s+'</div>'; }).join('');
    return '<div class="order"><div class="order-top">' +
      '<img class="order-thumb" src="'+IMP.esc(o.img)+'" alt=""><div><div class="order-id">Order '+o.id+' · '+o.date+'</div><div class="order-name">'+IMP.esc(o.name)+'</div></div>' +
      '<span class="order-status '+stCls+'">'+stTxt+'</span></div>' +
      '<div class="order-body">' +
        '<div><div class="k">Quantity</div><div class="v">'+o.qty.toLocaleString()+' units</div></div>' +
        '<div><div class="k">Manufacturer</div><div class="v">'+IMP.esc(o.maker)+'</div></div>' +
        '<div><div class="k">Total</div><div class="v">'+money(o.total)+'</div></div>' +
        '<div style="margin-left:auto;align-self:center"><a class="btn" href="confirmation.html">Track order</a></div>' +
      '</div>' +
      '<div class="track">'+steps+'</div></div>';
  }).join('');
})();
</script>
</body>
</html>
