<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse premium, customisable packaging templates by category — bags, boxes, mailers, food, beauty, jewellery and more.">
  <title>Products — IMPRINT®</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="catalog.css">
  <style>
    .cat-sticky { position: sticky; top: calc(var(--imp-header-h) + 49px); z-index: 30; background: var(--imp-bg); padding: 14px 0; border-bottom: 1px solid var(--imp-border); }
    .cat-sticky .catchips { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 2px; -webkit-overflow-scrolling: touch; }
    .cat-section { scroll-margin-top: 160px; }
  </style>
</head>
<body>
<div id="site-header"></div>
<div id="site-nav"></div>

<section class="imp-wrap pagehead">
  <h1>The marketplace</h1>
  <p>Every product is a customisable designer template — open one in 3D, make it yours, and we route it to a vetted manufacturer. Browse by category.</p>
</section>

<div class="cat-sticky"><div class="imp-wrap"><div class="catchips" id="cat-chips"></div></div></div>

<div id="cat-sections" class="imp-wrap" style="padding-top:8px;padding-bottom:60px"></div>

<div id="site-footer"></div>

<script src="shared.js"></script>
<script src="catalog.js"></script>
<script src="app.js"></script>
<script>
(function(){
  IMP.initAppHeader({ activePage:'products' });
  var C = IMP.cat();

  // chips
  var chips = '<a class="catchip active" data-cat="all" href="#top">All</a>' +
    C.categories.map(function(cat){
      var n = C.products.filter(function(p){return p.category===cat.id;}).length;
      return '<a class="catchip" data-cat="'+cat.id+'" href="#'+cat.id+'">'+cat.name+' ('+n+')</a>';
    }).join('');
  document.getElementById('cat-chips').innerHTML = chips;

  // sections (flagship pinned to top of its category)
  var html = '';
  C.categories.forEach(function(cat){
    var prods = C.products.filter(function(p){return p.category===cat.id;});
    if(!prods.length) return;
    prods.sort(function(a,b){ return (b.featured?1:0)-(a.featured?1:0) || b.rating-a.rating; });
    html += '<section class="sec cat-section" id="'+cat.id+'">' +
      '<div class="sec-head"><div><h2 class="sec-title">'+cat.name+'</h2><p class="sec-sub">'+cat.desc+'</p></div><span class="fcount">'+prods.length+' designs</span></div>' +
      '<div class="pgrid">' + prods.map(IMP.productCard).join('') + '</div></section>';
  });
  document.getElementById('cat-sections').innerHTML = html;

  // chip filter (show all + scroll, or isolate a category)
  var chipsEl = document.getElementById('cat-chips');
  function setActive(cat){
    chipsEl.querySelectorAll('.catchip').forEach(function(c){ c.classList.toggle('active', c.getAttribute('data-cat')===cat); });
    document.querySelectorAll('.cat-section').forEach(function(s){ s.style.display = (cat==='all'||s.id===cat)?'':'none'; });
  }
  chipsEl.addEventListener('click', function(e){
    var c = e.target.closest('.catchip'); if(!c) return;
    var cat = c.getAttribute('data-cat');
    if(cat==='all'){ setActive('all'); window.scrollTo({top:0,behavior:'smooth'}); e.preventDefault(); }
    else { setActive('all'); /* keep all visible, just scroll to section */ }
  });

  // deep-link from landing (#catid)
  if(location.hash){ var id=location.hash.slice(1); var el=document.getElementById(id); if(el){ setTimeout(function(){ el.scrollIntoView({behavior:'smooth'}); },120); } }
})();
</script>
</body>
</html>
